name: Update VPN Configs

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download fresh configs
        run: |
          mkdir -p configs/users
          curl -fsSL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile.txt" -o configs/mobile-whitelist-1.txt || true
          curl -fsSL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/Vless-Reality-White-Lists-Rus-Mobile-2.txt" -o configs/mobile-whitelist-2.txt || true
          curl -fsSL "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/WHITE-CIDR-RU-checked.txt" -o configs/white-cidr-checked.txt || true
          echo "Updated: $(date -u)" > configs/last_updated.txt

      - name: Update user config files
        run: |
          python3 - <<'PYEOF'
          import os, glob
          master = ""
          for f in ["configs/mobile-whitelist-1.txt", "configs/mobile-whitelist-2.txt", "configs/white-cidr-checked.txt"]:
              if os.path.exists(f):
                  master += open(f).read().strip() + "\n"
          if master:
              for uf in glob.glob("configs/users/*.txt"):
                  open(uf, "w").write(master)
              print(f"Updated {len(glob.glob('configs/users/*.txt'))} user files")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs/
          git diff --cached --quiet || git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
